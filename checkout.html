<!DOCTYPE html>
<html>

<head>
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center">Checkout</h1>

<div class="checkout-container">

<h2>Shipping Address</h2>

<input type="text" placeholder="Full Name">

</html>
